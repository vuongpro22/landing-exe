# Cấu hình Nginx gợi ý cho Landing Page SportMate
# Hướng dẫn: Sao chép nội dung này và đưa vào thư mục cấu hình Nginx của bạn (ví dụ: /etc/nginx/sites-available/sportmate.conf)

server {
    listen 80;
    listen [::]:80;
    
    # Thay đổi domain của bạn ở đây
    server_name sportmate.vn www.sportmate.vn;

    # Đường dẫn đến thư mục chứa mã nguồn Landing Page trên Server
    # Bạn cần tải thư mục 'landing-page' lên server và trỏ root vào đó
    root /var/www/sportmate-landing;
    index index.html;

    # Cấu hình mã hóa ký tự mặc định
    charset utf-8;

    # Log lưu trữ lượt truy cập và lỗi
    access_log /var/log/nginx/sportmate_access.log;
    error_log /var/log/nginx/sportmate_error.log;

    # Xử lý các yêu cầu trang tĩnh
    location / {
        try_files $uri $uri/ =404;
    }

    # Cấu hình cache cho các tài nguyên tĩnh để tăng tốc độ tải trang
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, inherit";
    }

    # Bảo mật: Ngăn truy cập vào các file ẩn (ví dụ: .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
